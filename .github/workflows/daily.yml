name: Polymarket Daily Summary

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  send-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic cryptography

      - name: Fetch Polymarket data and send summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS_ALGGRA: ${{ secrets.GMAIL_ADDRESS_ALGGRA }}
          GMAIL_PASSWORD_ALGGRA: ${{ secrets.GMAIL_PASSWORD_ALGGRA }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python send_summary.py
